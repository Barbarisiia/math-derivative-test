<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест: Похідна функції</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        .quiz-container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .question {
            margin-bottom: 20px;
        }
        .question h3 {
            margin-bottom: 10px;
            color: #34495e;
        }
        .answers {
            margin-bottom: 20px;
        }
        .answers label {
            display: block;
            margin-bottom: 8px;
            cursor: pointer;
            padding: 10px;
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .answers label:hover {
            background: #eef2f5;
        }
        .answers input[type="radio"] {
            margin-right: 10px;
        }
        button {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        #results {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Тест: Похідна функції</h1>
    <div id="quiz"></div>
    <button id="submit">Дізнатися результат</button>
    <div id="results"></div>
</div>

<script>
    const quizData = [
        {
            question: "1. Яка похідна функції y = x²?",
            answers: {
                a: "x",
                b: "2x",
                c: "x³/3"
            },
            correctAnswer: "b"
        },
        {
            question: "2. Чому дорівнює похідна константи (наприклад, y = 5)?",
            answers: {
                a: "1",
                b: "5",
                c: "0"
            },
            correctAnswer: "c"
        },
        {
            question: "3. Знайдіть похідну функції f(x) = sin(x).",
            answers: {
                a: "cos(x)",
                b: "-cos(x)",
                c: "-sin(x)"
            },
            correctAnswer: "a"
        },
        {
            question: "4. Яка похідна від функції f(x) = eˣ?",
            answers: {
                a: "x·eˣ⁻¹",
                b: "eˣ",
                c: "ln(x)"
            },
            correctAnswer: "b"
        },
        {
            question: "5. Знайдіть похідну суми функцій f(x) = 3x³ - 2x.",
            answers: {
                a: "9x² - 2",
                b: "3x² - 2",
                c: "9x² - 2x"
            },
            correctAnswer: "a"
        }
    ];

    const quizContainer = document.getElementById('quiz');
    const resultsContainer = document.getElementById('results');
    const submitButton = document.getElementById('submit');

    function buildQuiz() {
        const output = [];

        quizData.forEach((currentQuestion, questionNumber) => {
            const answers = [];
            for (letter in currentQuestion.answers) {
                answers.push(
                    `<label>
                        <input type="radio" name="question${questionNumber}" value="${letter}">
                        ${letter}) ${currentQuestion.answers[letter]}
                    </label>`
                );
            }

            output.push(
                `<div class="question">
                    <h3>${currentQuestion.question}</h3>
                    <div class="answers"> ${answers.join('')} </div>
                </div>`
            );
        });

        quizContainer.innerHTML = output.join('');
    }

    function showResults() {
        const answerContainers = quizContainer.querySelectorAll('.answers');
        let numCorrect = 0;

        quizData.forEach((currentQuestion, questionNumber) => {
            const answerContainer = answerContainers[questionNumber];
            const selector = `input[name=question${questionNumber}]:checked`;
            const userAnswer = (answerContainer.querySelector(selector) || {}).value;

            if (userAnswer === currentQuestion.correctAnswer) {
                numCorrect++;
                answerContainers[questionNumber].style.color = 'green';
            } else {
                answerContainers[questionNumber].style.color = 'red';
            }
        });

        resultsContainer.innerHTML = `Ви набрали ${numCorrect} з ${quizData.length} правильних відповідей!`;
    }

    buildQuiz();
    submitButton.addEventListener('click', showResults);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест: Похідна функції</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        .quiz-container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .question {
            margin-bottom: 25px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }
        .question h3 {
            margin-bottom: 15px;
            color: #34495e;
        }
        .answers {
            margin-bottom: 20px;
        }
        .answers label {
            display: block;
            margin-bottom: 8px;
            cursor: pointer;
            padding: 12px;
            background: #f9f9f9;
            border: 2px solid transparent; /* Додано для красивішого виділення */
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .answers label:hover {
            background: #eef2f5;
        }
        .answers input[type="radio"] {
            margin-right: 10px;
            transform: scale(1.2);
        }
        button {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        #results {
            margin-top: 25px;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
        }

        /* Нові класи для підсвічування відповідей */
        .correct-answer {
            background-color: #d4edda !important;
            border-color: #28a745 !important;
            color: #155724;
        }
        .wrong-answer {
            background-color: #f8d7da !important;
            border-color: #dc3545 !important;
            color: #721c24;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Тест: Похідна функції</h1>
    <div id="quiz"></div>
    <button id="submit">Перевірити відповіді</button>
    <div id="results"></div>
</div>

<script>
    const quizData = [
        {
            question: "1. Яка похідна функції y = x²?",
            answers: {
                a: "x",
                b: "2x",
                c: "x³/3"
            },
            correctAnswer: "b"
        },
        {
            question: "2. Чому дорівнює похідна константи (наприклад, y = 5)?",
            answers: {
                a: "1",
                b: "5",
                c: "0"
            },
            correctAnswer: "c"
        },
        {
            question: "3. Знайдіть похідну функції f(x) = sin(x).",
            answers: {
                a: "cos(x)",
                b: "-cos(x)",
                c: "-sin(x)"
            },
            correctAnswer: "a"
        },
        {
            question: "4. Яка похідна від функції f(x) = eˣ?",
            answers: {
                a: "x·eˣ⁻¹",
                b: "eˣ",
                c: "ln(x)"
            },
            correctAnswer: "b"
        },
        {
            question: "5. Знайдіть похідну суми функцій f(x) = 3x³ - 2x.",
            answers: {
                a: "9x² - 2",
                b: "3x² - 2",
                c: "9x² - 2x"
            },
            correctAnswer: "a"
        }
    ];

    const quizContainer = document.getElementById('quiz');
    const resultsContainer = document.getElementById('results');
    const submitButton = document.getElementById('submit');

    function buildQuiz() {
        const output = [];

        quizData.forEach((currentQuestion, questionNumber) => {
            const answers = [];
            for (letter in currentQuestion.answers) {
                answers.push(
                    `<label>
                        <input type="radio" name="question${questionNumber}" value="${letter}">
                        ${letter}) ${currentQuestion.answers[letter]}
                    </label>`
                );
            }

            output.push(
                `<div class="question">
                    <h3>${currentQuestion.question}</h3>
                    <div class="answers"> ${answers.join('')} </div>
                </div>`
            );
        });

        quizContainer.innerHTML = output.join('');
    }

    function showResults() {
        const answerContainers = quizContainer.querySelectorAll('.answers');
        let numCorrect = 0;

        quizData.forEach((currentQuestion, questionNumber) => {
            const answerContainer = answerContainers[questionNumber];
            
            // Знаходимо, що вибрав користувач
            const selector = `input[name=question${questionNumber}]:checked`;
            const userRadio = answerContainer.querySelector(selector);
            const userAnswer = (userRadio || {}).value;

            // Знаходимо правильну кнопку та її контейнер (щоб підсвітити)
            const correctRadio = answerContainer.querySelector(`input[value=${currentQuestion.correctAnswer}]`);
            const correctLabel = correctRadio.parentElement;

            // Спочатку очищаємо всі класи з попередньої перевірки (якщо користувач натискає кнопку вдруге)
            const allLabels = answerContainer.querySelectorAll('label');
            allLabels.forEach(label => {
                label.classList.remove('correct-answer', 'wrong-answer');
            });

            // Перевіряємо відповідь
            if (userAnswer === currentQuestion.correctAnswer) {
                numCorrect++;
                // Підсвічуємо зеленою рамкою і фоном правильну відповідь
                correctLabel.classList.add('correct-answer');
            } else {
                // Якщо відповідь неправильна, підсвічуємо червоним те, що вибрав користувач (якщо він взагалі щось вибрав)
                if (userRadio) {
                    userRadio.parentElement.classList.add('wrong-answer');
                }
                // І обов'язково підсвічуємо зеленим правильний варіант, щоб було видно помилку
                correctLabel.classList.add('correct-answer');
            }
        });

        resultsContainer.innerHTML = `Ви набрали ${numCorrect} з ${quizData.length} правильних відповідей!`;
    }

    // Будуємо тест при завантаженні сторінки
    buildQuiz();

    // Обробник події для кнопки
    submitButton.addEventListener('click', showResults);
</script>

</body>
</html>
